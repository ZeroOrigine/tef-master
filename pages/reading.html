        // State management
        let currentLevel = 'all';

        let currentAnswers = {};
        let showingResults = false;

        renderFooter();
        updateFilteredExercises();
        renderExercise();

        // Filter exercises by level
        function updateFilteredExercises() {
            if (currentLevel === 'all') {
                filteredExercises = [...exercises];
            } else {
                filteredExercises = exercises.filter(ex => ex.level === currentLevel);
            }
            currentExerciseIndex = 0;
            currentAnswers = {};
            showingResults = false;
            renderExercise();
            updateProgress();
        }

        document.querySelectorAll('.level-btn').forEach(btn => {

                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));

                currentLevel = this.dataset.level;
                updateFilteredExercises();
            });
        });

            const container = document.getElementById('exercise-content');

                container.innerHTML = '<p style="text-align: center; padding: 2rem;">No exercises available for this level.</p>';
                return;

                    </button>

                    if (isCorrect) correctCount++;

                    return `

                html += `

                    <h3 style="margin-top: 2rem;">Detailed Results</h3>

                    <button class="btn-primary" onclick="nextPassage()" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 2rem;">

                // Save score

                    TEFProgress.saveTestScore('reading', exercise.id, score, total);

            }

            container.innerHTML = html;

            // Add event listeners to radio buttons
            if (!showingResults) {
                document.querySelectorAll('input[type="radio"]').forEach(radio => {
                    radio.addEventListener('change', function() {

        // Submit answers
        function submitAnswers() {
            const exercise = filteredExercises[currentExerciseIndex];
            if (Object.keys(currentAnswers).length < exercise.questions.length) {
                alert('Please answer all questions before submitting.');
                return;
            }
            showingResults = true;
            renderExercise();
        }

        // Next passage
        function nextPassage() {
            if (currentExerciseIndex < filteredExercises.length - 1) {
                currentExerciseIndex++;
                currentAnswers = {};
                showingResults = false;
                renderExercise();
                updateProgress();
                document.getElementById('exercise-content').parentElement.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('Congratulations! You have completed all passages at this level.');
            }
        }

        // Update progress
        function updateProgress() {
            const completed = completedExercises.length;
            const total = 10;
            const percentage = Math.round((completed / total) * 100);

            document.getElementById('progress-text').textContent = `${completed} passages completed`;
            document.getElementById('progress-bar').style.width = percentage + '%';

            let levelText = 'Keep practicing!';
            if (completed >= 10) levelText = 'Expert! All passages mastered!';
            else if (completed >= 7) levelText = 'Great progress!';
            else if (completed >= 5) levelText = 'Halfway there!';
            else if (completed >= 3) levelText = 'Good start!';

            document.getElementById('level-indicator').textContent = levelText;

            const xpTotal = completed * 10;
            document.getElementById('xp-display').textContent = `+${xpTotal} XP`;
        }
