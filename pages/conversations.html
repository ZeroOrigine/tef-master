                    { speaker: "Customer", name: "Client", text: "Non, pas de fièvre. Juste une migraine vraiment intense. J'ai aussi un peu de mal à digérer.", translation: "No fever. Just a really intense migraine. I also have some digestive issues." },

                    { speaker: "Customer", name: "Client", text: "Combien ça coûte? C'est remboursé par la Sécurité Sociale?", translation: "How much does it cost? Is it covered by social security?" },
                    { speaker: "Pharmacist", name: "Pharmacien", text: "L'ibuprofène coûte 5,50€ et est généralement remboursé. Le remède naturel n'est pas remboursé, mais coûte seulement 8€.", translation: "Ibuprofen costs €5.50 and is generally covered. The natural remedy isn't covered but only costs €8." },
                    { speaker: "Customer", name: "Client", text: "Je prends les deux. Quel est le dosage pour l'ibuprofène?", translation: "I'll take both. What's the dosage for ibuprofen?" },
                    { speaker: "Pharmacist", name: "Pharmacien", text: "Une comprimé toutes les 6 heures, maximum 3 par jour. Et buvez beaucoup d'eau. Au revoir!", translation: "One tablet every 6 hours, maximum 3 per day. And drink plenty of water. Goodbye!" }

                    { speaker: "Candidate", name: "Candidat", text: "Je maîtrise plusieurs langages de programmation - Python, Java, et JavaScript. J'ai aussi une expérience en gestion de projet agile et en leadership d'équipe.", translation: "I master several programming languages - Python, Java, and JavaScript. I also have experience in agile project management and team leadership." },
                    { speaker: "Interviewer", name: "Recruteur", text: "Excellent! Quel est votre plus grand défi en tant que professionnel?", translation: "Excellent! What's your biggest challenge as a professional?" },
                    { speaker: "Candidate", name: "Candidat", text: "Je dirais que c'est de trouver l'équilibre entre la qualité du code et les délais serrés. Mais je travaille constamment à l'amélioration de mes compétences de gestion du temps.", translation: "I'd say it's finding the balance between code quality and tight deadlines. But I constantly work on improving my time management skills." },
                    { speaker: "Interviewer", name: "Recruteur", text: "Comment voyez-vous votre carrière dans 5 ans?", translation: "How do you see your career in 5 years?" },

                    { speaker: "Agent", name: "Agent immobilier", text: "Bonjour! Bienvenue à notre agence. Comment puis-je vous aider?", translation: "Hello! Welcome to our agency. How can I help you?" },
                    { speaker: "Client", name: "Client", text: "Bonjour, je recherche un appartement à louer dans le 5ème arrondissement, si possible à proximité de la Sorbonne.", translation: "Hello, I'm looking for an apartment to rent in the 5th district, preferably near the Sorbonne." },
                    { speaker: "Agent", name: "Agent immobilier", text: "Excellent! Quel est votre budget mensuel et combien de pièces désirez-vous?", translation: "Excellent! What's your monthly budget and how many rooms would you like?" },

                    { speaker: "Agent", name: "Agent immobilier", text: "Bon! J'ai justement quelques propriétés qui correspondent à vos critères. Pouvez-vous me fournir des documents? Un CDI, des fiches de paie, un garant?", translation: "Great! I have a few properties that match your criteria. Can you provide me with documents? A permanent job contract, pay stubs, a guarantor?" },

            {
                id: 12,
                title: "Discussion d'affaires - Négocier un contrat",
                description: "Negotiating a business contract",
                level: "B2",
                topic: "work",
                dialogue: [
                    { speaker: "Manager1", name: "Directrice générale", text: "Merci de m'avoir rencontré. Je voulais discuter des termes de notre contrat de partenariat. Avez-vous eu l'occasion de examiner la proposition?", translation: "Thank you for meeting with me. I wanted to discuss the terms of our partnership contract. Have you had a chance to examine the proposal?" },
                    { speaker: "Manager2", name: "Chef de projet", text: "Oui, j'ai lu le document. Dans l'ensemble, c'est acceptable, mais j'ai quelques préoccupations concernant les délais de livraison et les pénalités en cas de retard.", translation: "Yes, I've read the document. Overall it's acceptable, but I have some concerns about delivery timelines and late penalties." },
                    { speaker: "Manager1", name: "Directrice générale", text: "Je comprends vos préoccupations. Pourriez-vous détailler vos points de vue?", translation: "I understand your concerns. Could you detail your points of view?" },
                    { speaker: "Manager2", name: "Chef de projet", text: "Le délai de 6 mois est très serré pour notre équipe. Nous proposons 8 mois pour assurer la qualité. Concernant les pénalités, 2% par mois nous semble excessive. Nous suggérons 1%.", translation: "The 6-month deadline is very tight for our team. We propose 8 months to ensure quality. Regarding penalties, 2% per month seems excessive. We suggest 1%." },
                    { speaker: "Manager1", name: "Directrice générale", text: "Je vois. Cependant, nos clients attendent le produit en 6 mois. Pourrions-nous trouver un compromis? Et à propos du prix, l'avez-vous examiné?", translation: "I see. However, our clients expect the product in 6 months. Could we find a compromise? And regarding the price, have you reviewed it?" },
                    { speaker: "Manager2", name: "Chef de projet", text: "Le prix initial de 150 000€ comprend-il tous les services d'assistance post-livraison? Nous aimerions clarifier cette clause.", translation: "Does the initial price of €150,000 include all post-delivery support services? We'd like to clarify this clause." },
                    { speaker: "Manager1", name: "Directrice générale", text: "C'est une bonne question. Actuellement, le prix inclut une assistance technique de 6 mois. Au-delà, ce serait un service additionnel facturé séparément.", translation: "That's a good question. Currently, the price includes 6 months of technical support. Beyond that would be an additional paid service." },
                    { speaker: "Manager2", name: "Chef de projet", text: "Je pense que nous devrions prolonger l'assistance à 12 mois inclus dans le prix, ou réduire le montant global à 140 000€ si c'est seulement 6 mois.", translation: "I think we should extend support to 12 months included in the price, or reduce the total amount to €140,000 if it's only 6 months." },
                    { speaker: "Manager1", name: "Directrice générale", text: "7 mois pour la livraison et 1,5% de pénalité - c'est notre dernière offre. Et nous pouvons ajouter une assistance de 9 mois pour 145 000€ au total.", translation: "7 months for delivery and 1.5% penalty - that's our best offer. And we can add 9 months of support for €145,000 total." },
                    { speaker: "Manager2", name: "Chef de projet", text: "Cela me semble raisonnable. Mais j'aimerais une clause de révision si les spécifications changent significativement.", translation: "That seems reasonable to me. But I'd like a clause for revision if specifications change significantly." },
                    { speaker: "Manager1", name: "Directrice générale", text: "D'accord. Je vais faire préparer un nouvel accord par nos avocats et vous l'enverrai la semaine prochaine.", translation: "Agreed. I'll have our lawyers prepare a new agreement and send it to you next week." }

                keyVocabulary: [
                    { word: "discussion d'affaires", translation: "business discussion" },
                    { word: "contrat de partenariat", translation: "partnership contract" },
                    { word: "délai de livraison", translation: "delivery deadline" },
                    { word: "pénalité", translation: "penalty" },
                    { word: "retard", translation: "delay" },
                    { word: "préoccupation", translation: "concern" },
                    { word: "serré", translation: "tight" },
                    { word: "compromis", translation: "compromise" },
                    { word: "assistance technique", translation: "technical support" },

                    { word: "spécifications", translation: "specifications" },
                    { word: "avocats", translation: "lawyers" }

        // Initialize page
        let currentMode = 'read'; // 'read' or 'practice'
        let currentLevelFilter = '';
        let currentTopicFilter = '';

        function initPage() {
            renderNav('conversations');
            renderFooter();
            displayConversations();
            updateProgressStats();
            loadModePreference();
        }

        function loadModePreference() {
            const saved = localStorage.getItem('conversationMode');
            if (saved) {
                currentMode = saved;
                updateModeButtonText();
            }
        }

        function displayConversations() {
            const container = document.getElementById('conversationsContainer');
            container.innerHTML = '';

            const filtered = conversations.filter(conv => {
                const levelMatch = !currentLevelFilter || conv.level === currentLevelFilter;
                const topicMatch = !currentTopicFilter || conv.topic === currentTopicFilter;
                return levelMatch && topicMatch;
            });

            filtered.forEach(conv => {
                const card = createConversationCard(conv);
                container.appendChild(card);
            });
        }

        function createConversationCard(conv) {
            const card = document.createElement('div');
            card.className = 'conversation-card';
            card.id = `conv-${conv.id}`;

            let dialogueHTML = '';
            
            if (currentMode === 'read') {
                dialogueHTML = createReadModeDialogue(conv);
            } else {
                dialogueHTML = createPracticeModeDialogue(conv);
            }

            card.innerHTML = `
                <div class="conversation-header">
                    <div>
                        <h3>${conv.title}</h3>
                        <p class="conversation-description">${conv.description}</p>
                    </div>
                    <span class="level-badge level-${conv.level}">${conv.level}</span>
                </div>

                ${dialogueHTML}

                <div class="cultural-note">
                    <strong>Cultural Note:</strong> ${conv.culturalNote}
                </div>

                ${currentMode === 'practice' ? `
                    <div class="practice-actions">
                        <button class="btn btn-primary" onclick="checkAnswers(${conv.id})">Check Answers</button>
                    </div>
                ` : ''}
            `;

            return card;
        }

        function createReadModeDialogue(conv) {
            const keyVocabHTML = `
                <div class="key-vocabulary">
                    <strong>Key Vocabulary:</strong>
                    <ul class="vocab-list">
                        ${conv.keyVocabulary.map(item => `
                            <li><span class="vocab-word">${item.word}</span> = ${item.translation}</li>
                        `).join('')}
                    </ul>
                </div>
            `;

            const dialogueHTML = `
                <div class="dialogue">
                    ${conv.dialogue.map((line, idx) => {
                        const isSpeaker1 = ['Customer', 'Client', 'Candidate', 'Sophie', 'Liam', 'Marie', 'Pierre'].includes(line.speaker);
                        return `
                            <div class="bubble-container">
                                <div class="bubble ${isSpeaker1 ? 'bubble-left' : 'bubble-right'}">
                                    <div class="bubble-label">${line.name}</div>
                                    <div class="bubble-text">${highlightVocabulary(line.text, conv.keyVocabulary)}</div>
                                    <div class="bubble-translation">${line.translation}</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            return `${keyVocabHTML}${dialogueHTML}`;
        }

        function createPracticeModeDialogue(conv) {
            const keyVocabHTML = `
                <div class="key-vocabulary">
                    <strong>Key Vocabulary:</strong>
                    <ul class="vocab-list">
                        ${conv.keyVocabulary.map(item => `
                            <li><span class="vocab-word">${item.word}</span> = ${item.translation}</li>
                        `).join('')}
                    </ul>
                </div>
            `;

            const dialogueHTML = `
                <div class="dialogue practice-mode">
                    ${conv.dialogue.map((line, idx) => {
                        const isSpeaker1 = ['Customer', 'Client', 'Candidate', 'Sophie', 'Liam', 'Marie', 'Pierre'].includes(line.speaker);
                        const hasGap = conv.practiceGaps && conv.practiceGaps.includes(idx + 1);
                        const displayText = hasGap ? createGapInText(line.text, conv.id, idx) : highlightVocabulary(line.text, conv.keyVocabulary);
                        
                        return `
                            <div class="bubble-container">
                                <div class="bubble ${isSpeaker1 ? 'bubble-left' : 'bubble-right'}">
                                    <div class="bubble-label">${line.name}</div>
                                    <div class="bubble-text">${displayText}</div>
                                    <div class="bubble-translation">${line.translation}</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            return `${keyVocabHTML}${dialogueHTML}`;
        }

        function createGapInText(text, convId, lineIdx) {
            return `<input type="text" class="practice-input" data-conv="${convId}" data-line="${lineIdx}" data-correct="${text}" placeholder="Type the French text here...">`;
        }

        function highlightVocabulary(text, vocabulary) {
            let result = text;
            vocabulary.forEach(item => {
                const regex = new RegExp(`\\b${item.word}\\b`, 'gi');
                result = result.replace(regex, `<span class="vocab-highlight">${item.word}</span>`);
            });
            return result;
        }

        function checkAnswers(convId) {
            const conv = conversations.find(c => c.id === convId);
            const inputs = document.querySelectorAll(`[data-conv="${convId}"]`);
            let correctCount = 0;

            inputs.forEach(input => {
                const userAnswer = input.value.trim().toLowerCase();
                const correctAnswer = input.dataset.correct.toLowerCase();
                
                if (userAnswer === correctAnswer) {
                    input.classList.add('correct');
                    input.classList.remove('incorrect');
                    correctCount++;
                } else {
                    input.classList.add('incorrect');
                    input.classList.remove('correct');
                    input.title = `Correct: ${input.dataset.correct}`;
                }
            });

            if (correctCount === inputs.length) {
                alert('Perfect! All answers are correct!');
                saveProgress(convId, true);
                updateProgressStats();
            } else {
                alert(`${correctCount}/${inputs.length} correct. Keep practicing!`);
            }
        }

        function saveProgress(convId, completed) {
            let progress = JSON.parse(localStorage.getItem('conversationProgress') || '{}');
            progress[`conv_${convId}`] = {
                completed: completed,
                date: new Date().toISOString()
            };
            localStorage.setItem('conversationProgress', JSON.stringify(progress));
        }

        function updateProgressStats() {
            const progress = JSON.parse(localStorage.getItem('conversationProgress') || '{}');
            const completedCount = Object.values(progress).filter(p => p.completed).length;
            const total = conversations.length;
            const percentage = Math.round((completedCount / total) * 100);

            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('progressPercentage').textContent = percentage + '%';
        }

        function updateModeButtonText() {
            const button = document.getElementById('modeToggle');
            button.textContent = currentMode === 'read' ? 'Switch to Practice Mode' : 'Switch to Read Mode';
        }

        document.getElementById('modeToggle').addEventListener('click', function() {
            currentMode = currentMode === 'read' ? 'practice' : 'read';
            localStorage.setItem('conversationMode', currentMode);
            updateModeButtonText();
            displayConversations();
        });

        document.getElementById('levelFilter').addEventListener('change', function(e) {
            currentLevelFilter = e.target.value;
            displayConversations();
        });

        document.getElementById('topicFilter').addEventListener('change', function(e) {
            currentTopicFilter = e.target.value;
            displayConversations();
        });

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
