# TEF Master - Netlify Configuration
[build]
  publish = "."
  functions = "netlify/functions"
  # No build command needed - pure static site

[functions]
  # Increase timeout for AI-powered functions (Claude API calls)
  external_node_modules = ["@anthropic-ai/sdk", "resend"]
  node_bundler = "esbuild"

[functions."generate-results"]
  # Claude AI analysis needs more time
  timeout = 26

# Headers for performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect tef-master.ca (alias) to primary domain tef-master.com
[[redirects]]
  from = "https://tef-master.ca/*"
  to = "https://tef-master.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.tef-master.ca/*"
  to = "https://tef-master.com/:splat"
  status = 301
  force = true

# Redirect www to non-www for primary domain
[[redirects]]
  from = "https://www.tef-master.com/*"
  to = "https://tef-master.com/:splat"
  status = 301
  force = true

# Redirect /index.html to clean URL
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 200

# Custom 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
